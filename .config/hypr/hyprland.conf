# Default applications
$terminal = alacritty
$fileManager = nautilus --new-window
$browser = brave --new-window --enable-features=UseOzonePlatform --ozone-platform=wayland --force-device-scale-factor=1.0
$music = spotify
$webapp = $browser --app

exec-once = [workspace 1 silent] alacritty
exec-once = [workspace 2 silent] emacs
exec-once = [workspace 3 silent] chromium

animations {
  enabled = 0
}
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    layout = master
}

source = ~/dotfiles/.config/hypr/bindings.conf
# source = ~/dotfiles/.config/hypr/monitors.conf
source = ~/dotfiles/.config/hypr/autostart.conf
source = ~/dotfiles/.config/hypr/input.conf

windowrule = opacity 1.00, match:class .*

env = GDK_SCALE,2

bind = SUPER SHIFT, R, exec, ~/dotfiles/bin/move_displays # TODO set this up automatically

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

misc {
    force_default_wallpaper = 0
    focus_on_activate = true
    disable_hyprland_logo = true
}
