[user]
name = "lanceberge"
email = "bergeron.lance6@gmail.com"

[revsets]
bookmark-advance-to = "@-"

[ui]
editor = "emacsclient -t"
default-command = "status"
diff-editor = ":builtin"
pager = "less -FRX"
conflict-marker-style = "git"

[git]
fetch = ["origin"]
push = "origin"

[aliases]
ba = ["bookmark", "advance"]
b = ["bookmark"]
bl = ["bookmark", "list"]
bs = ["bookmark", "set"]
bd = ["bookmark", "delete"]

l = ["log"]
la = ["log", "-r", "ancestors(@)"]
s = ["squash"]
si = ["squash", "--ignore-immutable"]
d = ["diff"]
a = ["absorb"]
n = ["new"]
co = ["edit"]
e = ["edit"]
r = ["rebase"]
ab = ["abandon"]
u = ["undo"]
p = ["git", "push"]
f = ["git", "fetch"]
m = ["describe", "-m"]

t = ["tag"]
tr = ["tag", "list", "--sort", "author-date-"]
