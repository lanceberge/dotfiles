# vi is good
setw -g mode-keys emacs
set -g default-terminal "xterm-256color"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

unbind C-b
set-option -g prefix C-j
bind-key C-j send-prefix

bind-key -n M-z resize-pane -Z
bind-key -n M-[ previous-window
bind-key -n M-] next-window
bind-key -n M-n select-pane -D
bind-key -n M-p select-pane -U
bind-key -n M-b select-pane -L
bind-key -n M-f select-pane -R

bind-key -n M-a run-shell "tmux neww tmux-sessionizer"

bind-key -n M-j switch-client -l # last session
bind-key C-r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
bind C-z resize-pane -Z

bind c new-window -c "$(git rev-parse --show-toplevel 2>/dev/null || echo $PWD)"

bind-key C-[ copy-mode

set -ga update-environment " WAYLAND_DISPLAY XDG_RUNTIME_DIR"
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/dotfiles/bin/copy"

set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

bind-key enter next-layout

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j switch-client -l # last session
bind-key k select-pane -U
bind-key l select-pane -R
bind-key = select-layout -E
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key x kill-pane
bind-key d kill-window
bind-key C-d detach
bind-key C-n new-window

bind-key -r h run-shell "tmux neww cht.sh"
bind-key -r a run-shell "tmux neww tmux-sessionizer"
bind-key t new-window -c "#{pane_current_path}" "emacsclient -n ."
bind-key -n C-M-v copy-mode \; send-keys -X halfpage-up

# next window, previous window
bind-key -n M-o select-pane -t :.+
bind-key -n M-O select-pane -t :.-

# workspaces
bind-key C-w run-shell "tmux neww jj_workspace_new"
bind-key w run-shell "tmux neww jj_workspace"
bind-key C-f run-shell "tmux neww jj_workspace_find"
bind-key C-k run-shell "tmux neww jj_workspace_delete"

bind-key C-c run-shell "tmux neww claude --dangerously-skip-permissions"

bind-key -n C-M-r copy-mode \; send-keys C-r

# copy-mode bindings
bind-key -T copy-mode n send -X cursor-down
bind-key -T copy-mode p send -X cursor-up
# forward and previous line with highlight
bind-key -T copy-mode N if -F "#{selection_present}" "send -X cursor-down" "send -X begin-selection \; send -X cursor-down"
bind-key -T copy-mode P if -F "#{selection_present}" "send -X cursor-up" "send -X begin-selection \; send -X cursor-up"
bind-key -T copy-mode Space send -X begin-selection
bind-key -T copy-mode a send -X start-of-line
bind-key -T copy-mode e send -X end-of-line
bind-key -T copy-mode M send -X select-line
bind-key -T copy-mode > send -X history-bottom
bind-key -T copy-mode < send -X history-top

# Theme
set -g status-style "bg=default,fg=default" # status bar bg and fg

# padding
set -g status-left "  "

# Show the session name.
# set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
# Show copy mode, prefix, zoom state, and host name on the right side.
# set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g status-right "#[fg=black,bg=blue,bold] #S #[bg=default] "

set -g window-status-format "#[fg=brightblack] #I:#W " # inactive window style
set -g window-status-current-format "#[fg=blue] #I:#W " # active window style in the bar
set -g message-style "bg=default,fg=blue" # default tmux messages
set -g message-command-style "bg=default,fg=blue" # command prompt messages
set -g mode-style "bg=blue,fg=black" # copy mode style

set -g pane-border-style "fg=black" # inactive pane borders
# Use heavy Unicode line-drawing characters for pane borders.
# set -g pane-border-lines heavy
# Disable tmux's half-border active pane indicator.
set -g pane-border-indicators off
# Show pane titles in the top border line.
set -g pane-border-status top
# Show the current command in blue on the active pane border when border titles are enabled.
set -g pane-border-format '#{?pane_active, #[fg=blue]#{pane_current_command} ,}'
# Draw active pane borders in blue.
set -g pane-active-border-style 'fg=blue,bold'
